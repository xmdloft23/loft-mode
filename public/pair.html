<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>LOFT-QUANTUM | Secure Device Link</title>
  <meta name="description" content="Connect your WhatsApp to LOFT-QUANTUM instantly.">
  <meta name="theme-color" content="#06b67f">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a1f;
      color: #f0f9ff;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .gradient-text {
      background: linear-gradient(135deg, #67e8f9 0%, #22d3ee 50%, #06b67f 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nav-glass {
      background: rgba(10,10,31,0.88);
      border-bottom: 1px solid rgba(103,232,249,0.12);
      backdrop-filter: blur(16px);
    }
    .card {
      background: rgba(15,23,42,0.96);
      border: 1px solid rgba(103,232,249,0.15);
      border-radius: 26px;
      box-shadow: 0 28px 72px rgba(0,0,0,0.55);
    }
    .input-field {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.16);
      color: #f0f9ff; border-radius: 14px;
      width: 100%;
    }
    .btn-primary { background: linear-gradient(135deg, #06b67f, #0ea5e9); color: #fff; }
    .spinner {
      width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,0.25);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .code-display {
      font-size: 2.35rem; font-weight: 800; letter-spacing: 8px;
      background: linear-gradient(135deg, #67e8f9, #06b67f);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    /* Fixed: Ensure visibility even if JS delays */
    .visible-card { opacity: 1 !important; transform: none !important; }
  </style>
</head>
<body>

  <nav class="nav-glass sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-5 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="https://files.catbox.moe/d4nl2o.jpg" class="w-8 h-8 rounded-full border border-cyan-400/50">
        <span class="text-base font-bold gradient-text">LOFT-QUANTUM</span>
      </div>
    </div>
  </nav>

  <main class="flex flex-col items-center justify-center px-5 py-12">
    <div class="w-full max-w-md">
      
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold gradient-text mb-1">Secure Device Link</h1>
        <p class="text-slate-400 text-sm">Tumia format ya 255XXXXXXXXX</p>
      </div>

      <div id="resultSection" class="card p-7 hidden mb-6">
        <div class="text-center mb-6">
          <p class="text-white font-semibold text-base mb-1">YOur Pairing Code</p>
          <p class="text-slate-400 text-xs">Ingiza hii kwenye WhatsApp Linked Devices</p>
        </div>
        <div class="bg-cyan-900/10 border border-cyan-400/20 rounded-3xl p-6 text-center mb-5">
          <p id="pairCode" class="code-display">--------</p>
        </div>
        <button id="copyBtn" class="w-full py-3 bg-emerald-500/20 border border-emerald-500/40 rounded-xl text-emerald-400 font-bold">
          COPY CODE
        </button>
        <button onclick="window.location.reload()" class="w-full mt-3 text-slate-500 text-sm">Request New</button>
      </div>

      <div id="formSection" class="card p-7">
        <div class="mb-5">
          <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">WhatsApp Number</label>
          <input id="phoneNumber" type="text" placeholder="e.g. 255712345678" class="input-field px-4 py-3 outline-none focus:border-cyan-400">
          <p id="errorMsg" class="text-rose-400 text-xs mt-2 hidden"></p>
        </div>

        <div class="mb-6">
          <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Session Type</label>
          <div class="flex gap-2">
            <button onclick="setType('short')" id="btnShort" class="flex-1 py-2 rounded-lg border border-cyan-500 bg-cyan-500/20 text-white text-sm">Quick</button>
            <button onclick="setType('long')" id="btnLong" class="flex-1 py-2 rounded-lg border border-white/10 text-slate-400 text-sm">Extended</button>
          </div>
        </div>

        <button id="submitBtn" class="btn-primary w-full py-3 rounded-xl font-bold flex items-center justify-center gap-2">
          <span id="btnText">GENERATE CODE</span>
          <div id="loader" class="spinner hidden"></div>
        </button>
      </div>

    </div>
  </main>

  <script>
    let selectedType = 'short';
    const phoneInput = document.getElementById('phoneNumber');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');
    const pairCode = document.getElementById('pairCode');
    const formSection = document.getElementById('formSection');
    const resultSection = document.getElementById('resultSection');

    function setType(type) {
      selectedType = type;
      document.getElementById('btnShort').className = type === 'short' ? 'flex-1 py-2 rounded-lg border border-cyan-500 bg-cyan-500/20 text-white text-sm' : 'flex-1 py-2 rounded-lg border border-white/10 text-slate-400 text-sm';
      document.getElementById('btnLong').className = type === 'long' ? 'flex-1 py-2 rounded-lg border border-cyan-500 bg-cyan-500/20 text-white text-sm' : 'flex-1 py-2 rounded-lg border border-white/10 text-slate-400 text-sm';
    }

    submitBtn.addEventListener('click', async () => {
      const num = phoneInput.value.replace(/\D/g, '');
      
      if (num.length < 10) {
        errorMsg.textContent = "Ingiza namba sahihi ya simu!";
        errorMsg.classList.remove('hidden');
        return;
      }

      errorMsg.classList.add('hidden');
      document.getElementById('btnText').classList.add('hidden');
      document.getElementById('loader').classList.remove('hidden');
      submitBtn.disabled = true;

      try {
        // FIXED: Correct backtick syntax
        const response = await fetch(`/code?number=${num}&type=${selectedType}`);
        const data = await response.json();

        if (data.code) {
          pairCode.textContent = data.code;
          formSection.classList.add('hidden');
          resultSection.classList.remove('hidden');
        } else {
          throw new Error(data.error || "Server error");
        }
      } catch (err) {
        errorMsg.textContent = "Server imefeli. Jaribu tena.";
        errorMsg.classList.remove('hidden');
      } finally {
        document.getElementById('btnText').classList.remove('hidden');
        document.getElementById('loader').classList.add('hidden');
        submitBtn.disabled = false;
      }
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(pairCode.textContent);
      alert("Code copied!");
    });
  </script>
</body>
</html>
