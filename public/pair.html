<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>LOFT-QUANTUM | Secure Device Link</title>
  <meta name="description" content="Connect your WhatsApp to LOFT-QUANTUM instantly.">
  <meta name="theme-color" content="#06b67f">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a1f;
      color: #f0f9ff;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .gradient-text {
      background: linear-gradient(135deg, #67e8f9 0%, #22d3ee 50%, #06b67f 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nav-glass {
      background: rgba(10,10,31,0.88);
      border-bottom: 1px solid rgba(103,232,249,0.12);
      backdrop-filter: blur(16px);
    }
    .card {
      background: rgba(15,23,42,0.96);
      border: 1px solid rgba(103,232,249,0.15);
      border-radius: 26px;
      box-shadow: 0 28px 72px rgba(0,0,0,0.55);
      /* FIXED: Aligned visibility to show immediately */
      opacity: 1 !important;
      transform: none !important;
    }
    .input-field {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.16);
      color: #f0f9ff; border-radius: 14px;
      width: 100%;
    }
    .btn-primary { 
      background: linear-gradient(135deg, #06b67f, #0ea5e9); 
      color: #fff; 
      transition: transform 0.2s;
    }
    .btn-primary:active { transform: scale(0.95); }
    
    .spinner {
      width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .code-display {
      font-size: 2.5rem; font-weight: 800; letter-spacing: 8px;
      background: linear-gradient(135deg, #67e8f9, #06b67f);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body>

  <nav class="nav-glass sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-5 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="https://files.catbox.moe/d4nl2o.jpg" class="w-8 h-8 rounded-full border border-cyan-400/50">
        <span class="text-base font-bold gradient-text">LOFT-QUANTUM</span>
      </div>
      <a href="/" class="text-slate-400 text-sm"><i class="fas fa-home"></i> Home</a>
    </div>
  </nav>

  <main class="flex flex-col items-center justify-center px-5 py-12">
    <div class="w-full max-w-md">
      
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold gradient-text mb-1">Device Link</h1>
        <p class="text-slate-400 text-sm">Ingiza namba ya WhatsApp (e.g. 255712...)</p>
      </div>

      <div id="resultSection" class="card p-7 hidden mb-6 text-center">
        <div class="w-12 h-12 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
          <i class="fas fa-check text-emerald-400"></i>
        </div>
        <p class="text-white font-bold text-lg mb-1">Pairing Code</p>
        <p class="text-slate-400 text-xs mb-6">Weka kodi hii kwenye simu yako</p>
        
        <div class="bg-black/40 border border-white/10 rounded-2xl p-6 mb-6">
          <p id="pairCode" class="code-display">--------</p>
        </div>

        <button id="copyBtn" class="w-full py-3 bg-cyan-500/20 border border-cyan-500/40 rounded-xl text-cyan-400 font-bold mb-3">
          <i class="fas fa-copy mr-2"></i> COPY CODE
        </button>
        <button onclick="window.location.reload()" class="text-slate-500 text-xs hover:text-white transition-colors">Request New Code</button>
      </div>

      <div id="formSection" class="card p-7">
        <div class="mb-5">
          <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">WhatsApp Number</label>
          <div class="relative">
             <i class="fas fa-phone-alt absolute left-4 top-4 text-slate-500 text-xs"></i>
             <input id="phoneNumber" type="text" placeholder="255712345678" class="input-field pl-10 pr-4 py-3 outline-none focus:border-cyan-400">
          </div>
          <p id="errorMsg" class="text-rose-400 text-xs mt-3 hidden flex items-center gap-2">
             <i class="fas fa-circle-exclamation"></i> <span id="errTxt"></span>
          </p>
        </div>

        <div class="mb-6">
          <label class="block text-xs font-semibold text-slate-400 uppercase mb-2">Session Mode</label>
          <div class="flex p-1 bg-black/30 rounded-xl border border-white/5">
            <button onclick="setType('short')" id="btnShort" class="flex-1 py-2 rounded-lg bg-cyan-500 text-white text-xs font-bold transition-all">Quick</button>
            <button onclick="setType('long')" id="btnLong" class="flex-1 py-2 rounded-lg text-slate-500 text-xs font-bold transition-all">Extended</button>
          </div>
        </div>

        <button id="submitBtn" class="btn-primary w-full py-4 rounded-xl font-bold flex items-center justify-center gap-3">
          <span id="btnText">GENERATE PAIRING CODE</span>
          <div id="loader" class="spinner hidden"></div>
        </button>
      </div>

    </div>
  </main>

  <script>
    let selectedType = 'short';
    const phoneInput = document.getElementById('phoneNumber');
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');
    const errTxt = document.getElementById('errTxt');
    const pairCode = document.getElementById('pairCode');
    const formSection = document.getElementById('formSection');
    const resultSection = document.getElementById('resultSection');

    // UI Toggle for session type
    function setType(type) {
      selectedType = type;
      const bS = document.getElementById('btnShort');
      const bL = document.getElementById('btnLong');
      
      if(type === 'short') {
        bS.className = 'flex-1 py-2 rounded-lg bg-cyan-500 text-white text-xs font-bold transition-all';
        bL.className = 'flex-1 py-2 rounded-lg text-slate-500 text-xs font-bold transition-all';
      } else {
        bL.className = 'flex-1 py-2 rounded-lg bg-cyan-500 text-white text-xs font-bold transition-all';
        bS.className = 'flex-1 py-2 rounded-lg text-slate-500 text-xs font-bold transition-all';
      }
    }

    submitBtn.addEventListener('click', async () => {
      const num = phoneInput.value.replace(/\D/g, ''); // Safisha namba
      
      if (!num || num.length < 10) {
        errTxt.textContent = "Ingiza namba sahihi ya simu!";
        errorMsg.classList.remove('hidden');
        return;
      }

      // Reset UI state
      errorMsg.classList.add('hidden');
      document.getElementById('btnText').classList.add('hidden');
      document.getElementById('loader').classList.remove('hidden');
      submitBtn.disabled = true;

      try {
        // FIXED FETCH: Using standard backticks for proper URL building
        const response = await fetch(`/code?number=${num}&type=${selectedType}`);
        
        if (!response.ok) throw new Error("Server Error");

        const data = await response.json();

        if (data.code) {
          pairCode.textContent = data.code;
          formSection.classList.add('hidden');
          resultSection.classList.remove('hidden');
        } else {
          throw new Error(data.error || "Mawasiliano yamefeli");
        }
      } catch (err) {
        errTxt.textContent = "Tatizo la kiufundi. Jaribu tena.";
        errorMsg.classList.remove('hidden');
        console.error(err);
      } finally {
        document.getElementById('btnText').classList.remove('hidden');
        document.getElementById('loader').classList.add('hidden');
        submitBtn.disabled = false;
      }
    });

    // Copy function
    document.getElementById('copyBtn').addEventListener('click', () => {
      const code = pairCode.textContent;
      navigator.clipboard.writeText(code).then(() => {
        const originalBtn = document.getElementById('copyBtn').innerHTML;
        document.getElementById('copyBtn').innerHTML = '<i class="fas fa-check mr-2"></i> COPIED!';
        setTimeout(() => {
          document.getElementById('copyBtn').innerHTML = originalBtn;
        }, 2000);
      });
    });
  </script>
</body>
</html>
