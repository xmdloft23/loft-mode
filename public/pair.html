<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>LOFT-QUANTUM | Device Link</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a1f;
      color: #f0f9ff;
      margin: 0;
    }
    .gradient-text {
      background: linear-gradient(135deg, #67e8f9, #06b67f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .card {
      background: rgba(15,23,42,0.95);
      border: 1px solid rgba(103,232,249,0.2);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      /* Hii inazuia page kuwa blank */
      display: block !important;
      opacity: 1 !important;
    }
    .input-field {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 12px;
      outline: none;
    }
    .input-field:focus { border-color: #06b67f; }
    .btn-primary {
      background: linear-gradient(135deg, #06b67f, #0ea5e9);
      transition: all 0.3s ease;
    }
    .btn-primary:hover { transform: translateY(-2px); opacity: 0.9; }
    .code-box {
      font-size: 2.2rem;
      letter-spacing: 6px;
      font-weight: 800;
      color: #67e8f9;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <nav class="p-4 border-b border-white/5 bg-black/20 backdrop-blur-md">
    <div class="max-w-4xl mx-auto flex items-center gap-3">
      <img src="https://files.catbox.moe/d4nl2o.jpg" class="w-8 h-8 rounded-full border border-cyan-500">
      <span class="font-bold gradient-text">LOFT-QUANTUM</span>
    </div>
  </nav>

  <main class="flex-1 flex items-center justify-center p-6">
    <div class="w-full max-w-md">
      
      <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold mb-2">Device Link</h2>
        <p class="text-slate-400 text-sm">Weka namba yako (Anza na 255...)</p>
      </div>

      <div id="resultView" class="card p-8 hidden text-center">
        <p class="text-slate-400 text-sm mb-2">Kodi yako ya ku-pair ni:</p>
        <div class="bg-black/50 py-6 rounded-2xl border border-white/10 mb-6">
          <span id="pairCode" class="code-box">--------</span>
        </div>
        <button id="copyBtn" class="w-full py-3 bg-cyan-500/20 text-cyan-400 rounded-xl font-bold border border-cyan-500/30">
          <i class="fas fa-copy mr-2"></i> COPY CODE
        </button>
        <button onclick="window.location.reload()" class="mt-4 text-xs text-slate-500 hover:text-white">Request New</button>
      </div>

      <div id="formView" class="card p-8">
        <div class="mb-6">
          <label class="block text-xs font-bold text-slate-500 uppercase mb-2">WhatsApp Number</label>
          <input id="numberInput" type="text" placeholder="2557XXXXXXXX" class="input-field w-full px-4 py-3 text-lg">
          <p id="errMsg" class="text-rose-500 text-xs mt-2 hidden"></p>
        </div>

        <div class="mb-8">
          <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Session Mode</label>
          <div class="flex bg-black/40 p-1 rounded-xl border border-white/5">
            <button id="modeShort" onclick="setMode('short')" class="flex-1 py-2 rounded-lg bg-emerald-500 text-white text-xs font-bold">Quick</button>
            <button id="modeLong" onclick="setMode('long')" class="flex-1 py-2 text-slate-500 text-xs font-bold">Extended</button>
          </div>
        </div>

        <button id="submitBtn" class="btn-primary w-full py-4 rounded-xl font-bold flex items-center justify-center gap-3">
          <span id="btnLabel">GET PAIRING CODE</span>
          <div id="loader" class="spinner hidden"></div>
        </button>
      </div>

    </div>
  </main>

  <script>
    let mode = 'short';
    const numInp = document.getElementById('numberInput');
    const submitBtn = document.getElementById('submitBtn');
    const errMsg = document.getElementById('errMsg');
    const pairCode = document.getElementById('pairCode');
    const formView = document.getElementById('formView');
    const resultView = document.getElementById('resultView');

    function setMode(m) {
      mode = m;
      document.getElementById('modeShort').className = m === 'short' ? 'flex-1 py-2 rounded-lg bg-emerald-500 text-white text-xs font-bold' : 'flex-1 py-2 text-slate-500 text-xs font-bold';
      document.getElementById('modeLong').className = m === 'long' ? 'flex-1 py-2 rounded-lg bg-emerald-500 text-white text-xs font-bold' : 'flex-1 py-2 text-slate-500 text-xs font-bold';
    }

    submitBtn.addEventListener('click', async () => {
      const val = numInp.value.replace(/\D/g, '');

      if (val.length < 10) {
        errMsg.textContent = "Weka namba sahihi!";
        errMsg.classList.remove('hidden');
        return;
      }

      errMsg.classList.add('hidden');
      document.getElementById('btnLabel').classList.add('hidden');
      document.getElementById('loader').classList.remove('hidden');
      submitBtn.disabled = true;

      try {
        // Hapa ndipo taarifa zinapelekwa kwenye server (pair.js handler)
        const res = await fetch(`/code?number=${val}&type=${mode}`);
        const data = await res.json();

        if (data.code) {
          pairCode.textContent = data.code;
          formView.classList.add('hidden');
          resultView.classList.remove('hidden');
        } else {
          throw new Error(data.error || "Server error");
        }
      } catch (e) {
        errMsg.textContent = "Server imefeli, jaribu tena.";
        errMsg.classList.remove('hidden');
      } finally {
        document.getElementById('btnLabel').classList.remove('hidden');
        document.getElementById('loader').classList.add('hidden');
        submitBtn.disabled = false;
      }
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(pairCode.textContent);
      const btn = document.getElementById('copyBtn');
      btn.innerHTML = '<i class="fas fa-check mr-2"></i> COPIED!';
      setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy mr-2"></i> COPY CODE'; }, 2000);
    });
  </script>
</body>
</html>
